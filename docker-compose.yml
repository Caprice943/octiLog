
services:
  php:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/var/www/html
      - uploads_data:/var/www/html/public/uploads/montures
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - uploads_data:/var/www/html/public/uploads/montures
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php


  database:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=optique_db
      - MYSQL_USER=app
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql:rw


volumes:
  db_data:
  uploads_data:
